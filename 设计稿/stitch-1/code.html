<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#13ec5b",
                        "background-light": "#f6f8f6",
                        "background-dark": "#102216",
                        "slate-900": "#111813",
                        "slate-100": "#f0f4f2",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .tcm-bg-pattern {
            background-color: #f6f8f6;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 5L35 15L45 20L35 25L30 35L25 25L15 20L25 15Z' fill='%2313ec5b' fill-opacity='0.05'/%3E%3C/svg%3E");
        }
        .dark .tcm-bg-pattern {
            background-color: #102216;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 5L35 15L45 20L35 25L30 35L25 25L15 20L25 15Z' fill='%2313ec5b' fill-opacity='0.02'/%3E%3C/svg%3E");
        }
    </style>
</head>
<body class="font-display bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<div class="flex-1 flex items-center justify-center p-6 tcm-bg-pattern">
<div class="w-full max-w-[480px] bg-white dark:bg-slate-900/50 backdrop-blur-sm rounded-xl border border-primary/10 shadow-xl overflow-hidden">
<div class="p-8 border-b border-slate-100 dark:border-primary/10 flex flex-col items-center text-center">
<div class="size-16 bg-primary/10 rounded-full flex items-center justify-center mb-4 text-primary">
<span class="material-symbols-outlined text-4xl" data-icon="herbal_medicine">medication</span>
</div>
<h2 class="text-2xl font-bold tracking-tight text-slate-900 dark:text-slate-100">中医管理系统</h2>
<p class="text-slate-600 dark:text-slate-400 mt-2">登录以进入执业医师工作台</p>
</div>
<div class="p-8 space-y-6">
<div class="space-y-4">
<label class="block">
<span class="text-sm font-medium text-slate-700 dark:text-slate-300 mb-1.5 block">用户名</span>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xl">person</span>
<input class="w-full pl-10 pr-4 py-3 bg-white dark:bg-slate-800 border border-slate-200 dark:border-primary/20 rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all dark:text-slate-100" placeholder="请输入您的用户名" type="text"/>
</div>
</label>
<label class="block">
<span class="text-sm font-medium text-slate-700 dark:text-slate-300 mb-1.5 block">密码</span>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xl">lock</span>
<input class="w-full pl-10 pr-4 py-3 bg-white dark:bg-slate-800 border border-slate-200 dark:border-primary/20 rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all dark:text-slate-100" placeholder="••••••••" type="password"/>
</div>
</label>
</div>
<div class="flex items-center justify-between">
<label class="flex items-center gap-2 cursor-pointer group">
<div class="relative flex items-center">
<input class="peer appearance-none h-5 w-5 rounded border-2 border-slate-200 dark:border-primary/20 checked:bg-primary checked:border-primary transition-all cursor-pointer" type="checkbox"/>
<span class="material-symbols-outlined absolute text-white scale-0 peer-checked:scale-100 transition-transform pointer-events-none text-base font-bold left-0.5">check</span>
</div>
<span class="text-sm text-slate-600 dark:text-slate-400 group-hover:text-primary transition-colors">记住我</span>
</label>
<a class="text-sm font-medium text-primary hover:underline" href="#">忘记密码？</a>
</div>
<button class="w-full py-3.5 bg-primary hover:bg-primary/90 text-slate-900 font-bold rounded-lg shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2">
<span>登录工作台</span>
<span class="material-symbols-outlined text-xl">login</span>
</button>
<div class="pt-4 border-t border-slate-100 dark:border-primary/10 text-center">
<p class="text-xs text-slate-400 dark:text-slate-500 uppercase tracking-widest font-semibold mb-2">安全合规</p>
<div class="flex justify-center gap-4 text-slate-300 dark:text-slate-600">
<span class="material-symbols-outlined text-lg" title="符合 HIPAA 标准">verified_user</span>
<span class="material-symbols-outlined text-lg" title="SSL 加密">lock_reset</span>
<span class="material-symbols-outlined text-lg" title="数据隐私保护">privacy_tip</span>
</div>
</div>
</div>
</div>
</div>
<footer class="p-8 text-center text-slate-500 dark:text-slate-500 text-sm">
<p>© 2024 中医信息枢纽。版权所有。</p>
<p class="mt-1 flex items-center justify-center gap-2">
<span>技术支持：</span>
<span class="font-semibold text-slate-600 dark:text-slate-400">Django</span>
<span class="text-slate-300">+</span>
<span class="font-semibold text-slate-600 dark:text-slate-400">Vue.js</span>
</p>
</footer>
</body></html>
